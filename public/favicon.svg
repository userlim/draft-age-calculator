<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7e22ce;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="white" stroke="url(#shieldGradient)" stroke-width="2"/>

  <!-- Shield -->
  <g>
    <!-- Shield shape -->
    <path d="M 100 30 L 150 60 L 150 110 Q 150 150 100 170 Q 50 150 50 110 L 50 60 Z"
          fill="url(#shieldGradient)"
          stroke="url(#shieldGradient)"
          stroke-width="2"/>

    <!-- Inner highlight for depth -->
    <path d="M 105 40 L 145 65 L 145 110 Q 145 145 100 163 Q 60 145 60 110 L 60 65 Z"
          fill="rgba(255, 255, 255, 0.15)"/>

    <!-- Star symbol (representing military) -->
    <g transform="translate(100, 95)">
      <!-- Star points -->
      <path d="M 0,-18 L 4.5,-5.5 L 18,-2 L 9,6.5 L 11,20 L 0,14.5 L -11,20 L -9,6.5 L -18,-2 L -4.5,-5.5 Z"
            fill="white"
            stroke="white"
            stroke-width="0.5"/>
    </g>
  </g>

  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#shieldGradient)" stroke-width="1" opacity="0.5"/>
</svg>
